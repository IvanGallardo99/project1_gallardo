<!DOCTYPE html>
<html lang="en">
<head>
    <title>Cozy Bed & Breakfast</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Experience comfort and charm at Cozy Bed & Breakfast. Enjoy relaxing rooms, weekend events, and personalized hospitality for your perfect getaway.">
    <!-- Link to external CSS file -->
    <link href="css/styles.css" rel="stylesheet">
    <script src="scripts/estimate.js" defer></script>
</head>
<body>
<div id="wrapper">
    <!-- Site header with logo and business name -->
    <header>
        <h1>Cozy Bed & Breakfast</h1>
    </header>

    <!-- Sidebar navigation with relative links to different pages -->
    <nav>
        <ul> 
            <li><a href="index.html">Home</a></li>
            <li><a href="rooms/evergreen_retreat.html">Evergreen Retreat</a></li>
            <li><a href="rooms/garden_retreat.html">Garden Retreat</a></li>
            <li><a href="events/weekend_events.html">Weekend Events</a></li>
            <li><a href="estimate.html">Estimate Cost</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
    </nav>
    <div id="estimate"></div>

    <!-- Main content area -->
    <main>
        <h2>Estimate Your Stay</h2>
        <p> Select options below to estimate your total cost.</p>

        <form class="estimator">
            <p>
                <label for="nights">Number of Nights:</label> <br>
                <input type="number" id="nights" value="1" min="1">
            </p>
            
            <p> Select a Room</p>

            <p>
                <input type="radio" id="evergreenRoom" name="room" checked>
                <label for="evergreenRoom">Evergreen Retreat ($120/night)</label>
            </p>

            <p>
                <input type="radio" id="gardenRoom" name="room">
                <label for="gardenRoom">Garden Retreat ($130/night) </label>
            </p>

            <p>Add-On Features:</p>

            <p>
                <input type="checkbox" id="breakfast">
                <label for="breakfast">Breakfast (+$20)</label>
            </p>

            <p>
                <input type="checkbox" id="parking">
                <label for="parking">Parking (+$15)</label>
            </p>

            <p>
                <input type="checkbox" id="wifi">
                <label for="wifi">Premium Wi-Fi (+$10)</label>
            </p>

            <p>
                <input type="button" id="estimateButton" value="Calculate Estimate">
            </p>
        </form> 
        <h3> Total Estimate: <span id="totalCost">$0.00</span></h3>
    </main>

    <!-- Footer with copyright and contact email -->
    <footer>
        Copyright &copy; 2025 WebMaster<br>
        <a href="mailto:igallardo@amarillocollege.com">Ivan Gallardo</a><br>
    <script>
        document.write("This page was last modified on: " + document.lastModified);
    </script>
        
    </footer>
</div>
</body>
</html>
